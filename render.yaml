services:
  - type: web
    name: peergig-backend
    env: node
    rootDir: server # Tell Render the code is in the server folder
    buildCommand: npm install && npm rebuild
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_URL
        value: https://peergig.vercel.app # REPLACE WITH YOUR VERCEL URL
